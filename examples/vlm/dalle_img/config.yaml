FUNCTION_DESCRIPTION: |
    compute_mia_signal(logits: torch.Tensor) -> float
    Compute a membership-inference signal for a sample of a vision-language model.
    Inputs:
    - logits: The logits of image tokens for a single sample (not a batch). Shape: (Num tokens, Vocab size).

    Output:
    - A float `mia_signal`. Higher signal values indicate higher likelihood of membership.

    Requirements:
    - Compute the MIA signal using only the provided inputs (`logits`).
    - The implementation must be self-contained and rely solely on the input parameters and common Python libraries.
    - tqdm is recommended to be used for long loops to show progress.
    - The function `compute_mia_signal(logits: torch.Tensor) -> float` should be implemented to compute the signal for a sample.
    - There is no batch. The function is called for each sample.
    
    Context:
    - The model is a vision-language model. The logits are the output of the model for the image tokens only (the text logits are truncated). The logits are generated by sampling from the model given image-text samples (some are member samples, some are non-member samples).

EXAMPLE_PYTHON_CODE: |
    import torch
    import numpy as np

    def compute_mia_signal(
        logits: torch.Tensor,
    ) -> float:
        """
            Compute MIA signal from logits and input_ids using Renyi entropy with alpha=0.5.
            The signal is the mean of the top 10% of Renyi entropy values.
        """    
        # get renyi_05 for each token
        token_probs = torch.softmax(logits, dim=-1)
        token_probs = torch.clamp(token_probs, min=1e-10, max=1 - 1e-10)

        # calculate renyi_05 for each token
        alpha = 0.5
        renyi_05 = (1 / (1 - alpha)) * torch.log(torch.sum(token_probs ** alpha, dim=-1))
        renyi_05_np = renyi_05.detach().cpu().numpy()

        # get average of the top 10% of renyi_05 values as the signal
        top_10_percent = np.percentile(renyi_05_np, 90)
        top_10_percent_values = renyi_05_np[renyi_05_np > top_10_percent]

        # negative mean: higher values indicate higher likelihood of membership
        mia_signal = -1 * np.mean(top_10_percent_values)

        return float(mia_signal)

HIGH_LEVEL_IDEA: |
    If the image-text sample is from the training data, the model is likely more confident in generating the relevant text tokens.

DESIGN_JUSTIFICATION: |
    Use Renyi entropy to compute the MIA signal. Renyi entropy is a measure of the uncertainty of a probability distribution. It is a generalization of Shannon entropy. The higher the Renyi entropy, the more uncertain the model is about the next token.
    We use the top 10% of Renyi entropy values to compute the MIA signal. 
